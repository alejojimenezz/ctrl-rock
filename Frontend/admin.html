<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ctrl+Rock - Panel Administrativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #667eea;
            font-size: 28px;
            font-weight: bold;
        }

        .pedidos-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .pedidos-container h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .pedido-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 20px;
            background: #fafafa;
            transition: box-shadow 0.3s;
        }

        .pedido-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .pedido-id {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .pedido-estado {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            background: #28a745;
            color: white;
        }

        .pedido-estado.pagado {
            background: #28a745;
            color: white;
        }

        .pedido-estado.reembolsado {
            background: #6c757d;
            color: white;
        }

        .pedido-estado.disputado {
            background: #ffc107;
            color: #212529;
        }

        .pedido-estado.error, .pedido-estado.fallido {
            background: #dc3545;
            color: white;
        }

        .pedido-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .pedido-total {
            font-size: 20px;
            color: #28a745;
            font-weight: bold;
            margin: 10px 0;
        }

        .btn-ver-detalles {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-ver-detalles:hover {
            background: #5568d3;
        }

        .detalles-materiales {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .detalles-materiales.active {
            display: block;
        }

        .material-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
        }

        .material-info {
            flex: 1;
        }

        .material-componente {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }

        .material-nombre {
            font-size: 13px;
            color: #666;
        }

        .material-precios {
            text-align: right;
            margin-right: 20px;
        }

        .material-precio-usd {
            font-size: 14px;
            color: #666;
        }

        .material-precio-cop {
            font-size: 16px;
            font-weight: bold;
            color: #28a745;
        }

        .btn-amazon {
            background: #ff9900;
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-amazon:hover {
            background: #e88a00;
        }

        .btn-sincronizar {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-sincronizar:hover {
            background: #138496;
        }

        .btn-sincronizar:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .reembolso-info {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #218838;
        }

        @media (max-width: 768px) {
            .pedido-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .material-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .material-precios {
                text-align: left;
                margin-right: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎸 Panel Administrativo - Ctrl+Rock</h1>
            <p>Gestión de pedidos y materiales</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Pedidos</div>
                <div class="stat-value" id="total-pedidos">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ingresos Totales (COP)</div>
                <div class="stat-value" id="total-ingresos">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pedidos del Mes</div>
                <div class="stat-value" id="pedidos-mes">0</div>
            </div>
        </div>

        <div class="pedidos-container">
            <button class="refresh-btn" onclick="cargarPedidos()">🔄 Actualizar Pedidos</button>
            <button class="refresh-btn" onclick="sincronizarTodos()" style="background:#17a2b8;">🔄 Sincronizar Estados desde Stripe</button>
            <h2>Lista de Pedidos</h2>
            <div id="pedidos-list">
                <div class="loading">Cargando pedidos...</div>
            </div>
        </div>

        <div class="pedidos-container" style="margin-top: 30px;">
            <h2>📋 Logs de Webhooks de Stripe</h2>
            <button class="refresh-btn" onclick="cargarWebhookLogs()">🔄 Actualizar Logs</button>
            <div id="webhook-logs-list">
                <div class="loading">Cargando logs...</div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
